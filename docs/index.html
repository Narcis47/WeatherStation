<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherStation Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:           #0a0f1e;
            --surface:      #111827;
            --surface2:     #1a2234;
            --border:       #1f2d45;
            --accent-blue:  #3b82f6;
            --accent-orange:#f97316;
            --text:         #e2e8f0;
            --muted:        #64748b;
            --success:      #22c55e;
            --radius:       14px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        /* ── HEADER ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 36px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { font-size: 28px; }
        .logo-text { font-size: 20px; font-weight: 700; }
        .logo-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

        .status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* ── MAIN ── */
        main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

        /* ── TOP BAR ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .page-title { font-size: 22px; font-weight: 700; }

        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* ── DATE PICKER ── */
        .date-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 14px;
        }

        .date-picker-wrapper label {
            font-size: 12px;
            color: var(--muted);
            white-space: nowrap;
        }

        .date-input {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            font-size: 13px;
            padding: 6px 10px;
            font-family: inherit;
            cursor: pointer;
            outline: none;
        }

        .date-input:focus { border-color: var(--accent-blue); }

        .btn-today {
            background: var(--accent-blue);
            border: none;
            color: white;
            border-radius: 7px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s;
        }

        .btn-today:hover { opacity: 0.85; }

        /* ── REFRESH ── */
        .refresh-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .countdown {
            font-size: 12px;
            color: var(--muted);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 12px;
        }

        .refresh-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            padding: 7px 14px;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .refresh-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

        /* ── STAT CARDS ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px 24px;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
        }

        .stat-card.temp::before     { background: var(--accent-orange); }
        .stat-card.pressure::before { background: var(--accent-blue); }
        .stat-card.temp-min::before { background: #06b6d4; }
        .stat-card.temp-max::before { background: #ef4444; }

        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .stat-value { font-size: 36px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
        .stat-card.temp .stat-value     { color: var(--accent-orange); }
        .stat-card.pressure .stat-value { color: var(--accent-blue); }
        .stat-card.temp-min .stat-value { color: #06b6d4; }
        .stat-card.temp-max .stat-value { color: #ef4444; }

        .stat-unit { font-size: 16px; font-weight: 400; color: var(--muted); }
        .stat-sub  { font-size: 12px; color: var(--muted); margin-top: 6px; }

        /* ── CHARTS ── */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        @media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }

        .chart-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
        }

        .chart-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .chart-title {
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-dot { width: 10px; height: 10px; border-radius: 50%; }
        .chart-badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 20px;
            background: var(--surface2);
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .chart-container { position: relative; height: 220px; }

        /* ── TABLE ── */
        .table-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .table-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
        }

        .table-title { font-size: 15px; font-weight: 600; }
        .table-count { font-size: 12px; color: var(--muted); }

        table { width: 100%; border-collapse: collapse; }

        th {
            text-align: left;
            padding: 12px 24px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            background: var(--surface2);
            font-weight: 600;
        }

        td {
            padding: 13px 24px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--surface2); }

        .temp-cell     { color: var(--accent-orange); font-weight: 600; }
        .pressure-cell { color: var(--accent-blue);   font-weight: 600; }

        .empty { text-align: center; padding: 48px; color: var(--muted); font-size: 14px; }
        .empty-icon { font-size: 36px; margin-bottom: 10px; }

        /* ── DATE BADGE ── */
        .date-badge {
            font-size: 13px;
            color: var(--accent-blue);
            background: rgba(59,130,246,0.1);
            border: 1px solid rgba(59,130,246,0.2);
            border-radius: 8px;
            padding: 4px 12px;
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <div class="logo">
        <div class="logo-icon">🌤️</div>
        <div>
            <div class="logo-text">WeatherStation</div>
            <div class="logo-sub">BMP280 + ESP32 Monitor</div>
        </div>
    </div>
    <div style="display:flex; align-items:center; gap:20px;">
        <div class="status">
            <div class="status-dot"></div>
            <span>Live</span>
        </div>
        <div style="font-size:12px; color:var(--muted);">
            Last update: <span id="lastUpdate">—</span>
        </div>
    </div>
</header>

<main>

    <!-- TOP BAR -->
    <div class="top-bar">
        <div style="display:flex; align-items:center; gap:12px;">
            <div class="page-title">Dashboard</div>
            <div class="date-badge" id="dateBadge">Today</div>
        </div>

        <div class="controls">
            <!-- Date Picker -->
            <div class="date-picker-wrapper">
                <label>📅 Select date:</label>
                <input type="date" class="date-input" id="datePicker" onchange="onDateChange()" />
                <button class="btn-today" onclick="goToToday()">Today</button>
            </div>

            <!-- Refresh -->
            <div class="refresh-controls">
                <div class="countdown" id="countdownEl">
                    Auto-refresh in <span id="countdown">30</span>s
                </div>
                <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
            </div>
        </div>
    </div>

    <!-- STAT CARDS -->
    <div class="stats-grid">
        <div class="stat-card temp">
            <div class="stat-label">🌡️ Temperature</div>
            <div class="stat-value" id="currentTemp">—<span class="stat-unit">°C</span></div>
            <div class="stat-sub" id="currentTempSub">Latest reading</div>
        </div>
        <div class="stat-card pressure">
            <div class="stat-label">🔵 Pressure</div>
            <div class="stat-value" id="currentPressure">—<span class="stat-unit">hPa</span></div>
            <div class="stat-sub" id="currentPressureSub">Latest reading</div>
        </div>
        <div class="stat-card temp-min">
            <div class="stat-label">❄️ Min Temp</div>
            <div class="stat-value" id="minTemp">—<span class="stat-unit">°C</span></div>
            <div class="stat-sub">Daily minimum</div>
        </div>
        <div class="stat-card temp-max">
            <div class="stat-label">🔥 Max Temp</div>
            <div class="stat-value" id="maxTemp">—<span class="stat-unit">°C</span></div>
            <div class="stat-sub">Daily maximum</div>
        </div>
    </div>

    <!-- CHARTS -->
    <div class="charts-grid">
        <div class="chart-card">
            <div class="chart-header">
                <div class="chart-title">
                    <div class="chart-dot" style="background:#f97316;"></div>
                    Temperature
                </div>
                <span class="chart-badge">°C</span>
            </div>
            <div class="chart-container">
                <canvas id="tempChart"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <div class="chart-header">
                <div class="chart-title">
                    <div class="chart-dot" style="background:#3b82f6;"></div>
                    Pressure
                </div>
                <span class="chart-badge">hPa</span>
            </div>
            <div class="chart-container">
                <canvas id="pressureChart"></canvas>
            </div>
        </div>
    </div>

    <!-- TABLE -->
    <div class="table-card">
        <div class="table-header">
            <div class="table-title">📋 Readings</div>
            <div class="table-count" id="readingCount">0 readings</div>
        </div>
        <div id="tableBody">
            <div class="empty">
                <div class="empty-icon">📡</div>
                <div>Loading...</div>
            </div>
        </div>
    </div>

</main>

<script>
    const API_URL = 'http://localhost:8082';

    let tempChart, pressureChart;
    let countdownVal = 30;
    let countdownInterval;
    let selectedDate = getTodayStr();
    let isToday = true;

    // ── Date helpers ──
    function getTodayStr() {
        return new Date().toISOString().split('T')[0];
    }

    function formatDateLabel(dateStr) {
        if (dateStr === getTodayStr()) return 'Today';
        const d = new Date(dateStr);
        return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    // ── Init date picker ──
    document.getElementById('datePicker').value = getTodayStr();
    document.getElementById('datePicker').max = getTodayStr();

    function onDateChange() {
        selectedDate = document.getElementById('datePicker').value;
        isToday = selectedDate === getTodayStr();
        document.getElementById('dateBadge').textContent = formatDateLabel(selectedDate);

        // Hide countdown if not today
        document.getElementById('countdownEl').style.display = isToday ? 'block' : 'none';

        loadData();
    }

    function goToToday() {
        selectedDate = getTodayStr();
        isToday = true;
        document.getElementById('datePicker').value = selectedDate;
        document.getElementById('dateBadge').textContent = 'Today';
        document.getElementById('countdownEl').style.display = 'block';
        loadData();
    }

    // ── Chart setup ──
    const chartDefaults = {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: { display: false },
            tooltip: {
                backgroundColor: '#1a2234',
                borderColor: '#1f2d45',
                borderWidth: 1,
                titleColor: '#e2e8f0',
                bodyColor: '#94a3b8',
                padding: 10
            }
        },
        scales: {
            x: {
                grid: { color: '#1f2d45' },
                ticks: { color: '#64748b', font: { size: 11 }, maxTicksLimit: 8 }
            },
            y: {
                grid: { color: '#1f2d45' },
                ticks: { color: '#64748b', font: { size: 11 } }
            }
        },
        elements: {
            point: { radius: 3, hoverRadius: 5 },
            line: { tension: 0.4 }
        }
    };

    function initCharts() {
        const tempCtx = document.getElementById('tempChart').getContext('2d');
        tempChart = new Chart(tempCtx, {
            type: 'line',
            data: { labels: [], datasets: [{
                data: [],
                borderColor: '#f97316',
                backgroundColor: 'rgba(249,115,22,0.08)',
                fill: true, borderWidth: 2
            }]},
            options: { ...chartDefaults, scales: { ...chartDefaults.scales,
                y: { ...chartDefaults.scales.y, ticks: { ...chartDefaults.scales.y.ticks, callback: v => v + '°C' }}
            }}
        });

        const pressureCtx = document.getElementById('pressureChart').getContext('2d');
        pressureChart = new Chart(pressureCtx, {
            type: 'line',
            data: { labels: [], datasets: [{
                data: [],
                borderColor: '#3b82f6',
                backgroundColor: 'rgba(59,130,246,0.08)',
                fill: true, borderWidth: 2
            }]},
            options: { ...chartDefaults, scales: { ...chartDefaults.scales,
                y: { ...chartDefaults.scales.y, ticks: { ...chartDefaults.scales.y.ticks, callback: v => v + ' hPa' }}
            }}
        });
    }

    // ── Load data ──
    async function loadData() {
        try {
            const res = await fetch(`${API_URL}/api/data/getAll`);
            const all = await res.json();

            // Filter by selected date
            const filtered = all.filter(d => {
                const dateStr = new Date(d.updatedAt).toISOString().split('T')[0];
                return dateStr === selectedDate;
            }).sort((a, b) => new Date(a.updatedAt) - new Date(b.updatedAt));

            updateStats(filtered, all);
            updateCharts(filtered);
            updateTable(filtered);
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('en-GB');
            resetCountdown();
        } catch(e) {
            console.error('Failed to load data:', e);
        }
    }

    function updateStats(filtered, all) {
        // Latest reading — always from all data
        if (isToday && all.length > 0) {
            const latest = all[all.length - 1];
            document.getElementById('currentTemp').innerHTML =
                `${latest.temp.toFixed(1)}<span class="stat-unit">°C</span>`;
            document.getElementById('currentPressure').innerHTML =
                `${latest.pressure.toFixed(1)}<span class="stat-unit">hPa</span>`;
            document.getElementById('currentTempSub').textContent = 'Latest reading';
            document.getElementById('currentPressureSub').textContent = 'Latest reading';
        } else if (filtered.length > 0) {
            const last = filtered[filtered.length - 1];
            document.getElementById('currentTemp').innerHTML =
                `${last.temp.toFixed(1)}<span class="stat-unit">°C</span>`;
            document.getElementById('currentPressure').innerHTML =
                `${last.pressure.toFixed(1)}<span class="stat-unit">hPa</span>`;
            document.getElementById('currentTempSub').textContent = 'Last reading of day';
            document.getElementById('currentPressureSub').textContent = 'Last reading of day';
        }

        // Min / Max for selected day
        if (filtered.length > 0) {
            const temps = filtered.map(d => d.temp);
            document.getElementById('minTemp').innerHTML =
                `${Math.min(...temps).toFixed(1)}<span class="stat-unit">°C</span>`;
            document.getElementById('maxTemp').innerHTML =
                `${Math.max(...temps).toFixed(1)}<span class="stat-unit">°C</span>`;
        } else {
            document.getElementById('minTemp').innerHTML = `—<span class="stat-unit">°C</span>`;
            document.getElementById('maxTemp').innerHTML = `—<span class="stat-unit">°C</span>`;
        }
    }

    function updateCharts(data) {
        const labels = data.map(d =>
            new Date(d.updatedAt).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })
        );

        tempChart.data.labels = labels;
        tempChart.data.datasets[0].data = data.map(d => d.temp.toFixed(2));
        tempChart.update();

        pressureChart.data.labels = labels;
        pressureChart.data.datasets[0].data = data.map(d => d.pressure.toFixed(2));
        pressureChart.update();
    }

    function updateTable(data) {
        const body = document.getElementById('tableBody');
        document.getElementById('readingCount').textContent =
            `${data.length} readings`;

        if (data.length === 0) {
            body.innerHTML = `
                <div class="empty">
                    <div class="empty-icon">📭</div>
                    <div>No readings for ${formatDateLabel(selectedDate)}.</div>
                </div>`;
            return;
        }

        const recent = [...data].reverse().slice(0, 50);
        body.innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Time</th>
                        <th>Temperature</th>
                        <th>Pressure</th>
                    </tr>
                </thead>
                <tbody>
                    ${recent.map(d => `
                        <tr>
                            <td style="color:var(--muted);">${d.id}</td>
                            <td>${new Date(d.updatedAt).toLocaleTimeString('en-GB')}</td>
                            <td class="temp-cell">${d.temp.toFixed(2)} °C</td>
                            <td class="pressure-cell">${d.pressure.toFixed(2)} hPa</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>`;
    }

    // ── Countdown ──
    function resetCountdown() {
        countdownVal = 30;
        document.getElementById('countdown').textContent = countdownVal;
    }

    function startCountdown() {
        clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
            if (!isToday) return;
            countdownVal--;
            document.getElementById('countdown').textContent = countdownVal;
            if (countdownVal <= 0) loadData();
        }, 1000);
    }

    // ── Init ──
    initCharts();
    loadData();
    startCountdown();
</script>

</body>
</html>
